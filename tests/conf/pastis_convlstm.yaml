model:
  class_path: SpatioTemporalSegmentationTask
  init_args:
    in_channels: 10
    hidden_dim: 8
    kernel_size: 3
    num_layers: 1
    task: 'multiclass'
    num_classes: 20
    loss: 'ce'
data:
  class_path: PASTISDataModule
  init_args:
    batch_size: 3
    val_split_pct: 0.2
    test_split_pct: 0.2
    padding_length: 9
  dict_kwargs:
    root: 'tests/data/pastis'
