repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.3
    hooks:
      - id: ruff
        types_or:
          - python
          - jupyter
        args: ['--fix', '--show-fixes']
      - id: ruff-format
        types_or:
          - python
          - jupyter

  - repo: local
    hooks:
      - id: ty
        name: ty check
        entry: uv run --locked --extra datasets --extra models --extra style --extra tests ty check
        language: system
        pass_filenames: false

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        language: node
        language_version: 22.0.0
        args:
          - --write
        exclude: ^tests/data/[^/]+/$
